name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  linux-build:
    strategy:
      matrix:
        platform:
          - { name: "linux/amd64", filename_suffix: "linux-amd64", target_arch: "x86_64", runner: "ubuntu-22.04" }
          - { name: "linux/arm64", filename_suffix: "linux-arm64", target_arch: "arm64", runner: "ubuntu-22.04-arm" }
        runAllTests:
          - ${{ startsWith(github.ref, 'refs/tags/') }}
        # exclude:
        #   - platform: { name: "linux/arm64", filename_suffix: "linux-arm64", target_arch: "arm64"  }
        #     runAllTests: false
      fail-fast: false
    runs-on: ${{ matrix.platform.runner }}

    env:
      SLIPSHOW_PLATFORM: ${{ matrix.platform.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Needed to fetch tags

      # The latest tag is needed to build the release tarball but
      # actions/checkout fails to fetch it properly.
      # https://github.com/actions/checkout/issues/882
      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v3
        # with:
        #   image: tonistiigi/binfmt:latest
        #   platforms: all

      - name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        # with:
        #   driver: docker

      - name: Check images
        run: docker image ls

      - name: Build release tarball
        # if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p new_release; chmod a+rw new_release;
          docker buildx build --platform ${{ matrix.platform.name }} --load \
            --cache-to type=gha,mode=max \
            --cache-from type=gha \
            -f release/Dockerfile \
            -t slipshow-release-${{ matrix.platform.name }} .
          docker run --platform ${{ matrix.platform.name }} -v $PWD/new_release:/release \
            -e VERSION=$GITHUB_REF_NAME \
            -e TARGETOS=linux \
            -e TARGETARCH=${{ matrix.platform.target_arch }} \
            -e OUTPUT=/release \
            slipshow-release-${{ matrix.platform.name }} \
            opam exec -- bash release/release.sh

      - name: upload archives
        # if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: archives-linux-${{ matrix.platform.target_arch }}
          path: new_release/*

  mac-build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: "macos-15-intel", arch: "x86_64" }
          - { os: "macos-14", arch: "arm64" }
        ocaml-compiler:
          - 4.14.x
    runs-on: ${{ matrix.config.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # See the same step in the linux build
      - name: Fetch tags
        run: git fetch --tags --force origin

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v2
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}

      - name: Install dependencies
        run: opam install --deps-only --with-test --with-doc -y .

      - name: Build release tarball
        # if: startsWith(github.ref, 'refs/tags/')
        run: |
          mkdir -p new_release;
          export OUTPUT=$PWD/new_release;
          export TARGETOS=macos;
          export TARGETARCH=${{ matrix.config.arch }};
          export VERSION=$GITHUB_REF_NAME;
          opam exec -- bash release/release.sh

      - name: upload archives
        # if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: archives-${{ matrix.config.os }}-${{ matrix.config.arch }}
          path: new_release/*

  windows-build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "windows", os: "windows-2022", arch: "x86_64", target: "x64" }
        ocaml-compiler:
          - 4.14.x
    runs-on: ${{ matrix.config.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force origin

      - uses: actions/cache@v5
        id: wincache
        with:
          path: |
            ~/.opam
            _opam
          key: windows-${{ hashFiles('*.opam') }}

      - name: Install OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          cache-prefix: v3
          ocaml-compiler: 4.14
          opam-pin: false
          opam-repositories: |
            default: https://github.com/punchagan/opam-repository.git#f1c70a26b442142ba1c3bd040bf8621060c94912

      # - name: Install something that triggers mingw-w64-shims recompilation
      #   run: opam install conf-mingw-w64-gmp-x86_64 conf-mingw-w64-libffi-x86_64 conf-mingw-w64-openssl-x86_64 -y

      - name: Install system dependencies
        run: |
          opam depext conf-openssl conf-zlib -y
          # On s'assure que les paquets sont bien là pour la compilation
          opam install conf-openssl conf-zlib -y

      - name: Install dependencies
        if: steps.wincache.outputs.cache-hit != 'true'
        run: opam install --deps-only --with-test --with-doc -y .

      - name: Install dependencies
        if: steps.wincache.outputs.cache-hit
        run: opam install --deps-only --with-test --depext-only --with-doc -y . && opam upgrade

      - name: Build installable artifacts
        # run: opam exec -- dune build --profile release @install --ignore-promoted-rules      
        run: opam exec -- dune build --profile release @install

      - name: Install into relocatable bundle
        run: opam exec -- dune install --relocatable --prefix ${{ github.workspace }}/bundle slipshow
        
      - name: Verify "${{ github.workspace }}\bundle"
        run: |
          Write-Output "Test ${{ github.workspace }}/bundle : $(Test-Path ${{ github.workspace }}/bundle)"
          Get-ChildItem -Path ${{ github.workspace }}/bundle

      - name: Copy DLLs into bundle
        shell: pwsh
        run: |
          $bundleBin = "${{ github.workspace }}\bundle\bin"
          
          # On récupère le chemin racine de Cygwin/MSYS2 utilisé par opam
          $cygwinBin = opam var cygwin:root | Join-Path -ChildPath "bin"
          $mingwBin = opam var cygwin:root | Join-Path -ChildPath "usr\x86_64-w64-mingw32\sys-root\mingw\bin"
          
          $searchPaths = @($cygwinBin, $mingwBin) + ($env:PATH -split ";")
          
          # Patterns pour matcher les DLL (OpenSSL 3 utilise souvent des suffixes)
          $dllPatterns = @("libcrypto-3*.dll", "libssl-3*.dll", "zlib1.dll")

          foreach ($pattern in $dllPatterns) {
              $found = $false
              foreach ($path in $searchPaths) {
                  if (Test-Path $path) {
                      $dllFile = Get-ChildItem -Path $path -Filter $pattern | Select-Object -First 1
                      if ($dllFile) {
                          Write-Output "Found $($dllFile.FullName), copying to $bundleBin"
                          Copy-Item $dllFile.FullName $bundleBin -Force
                          $found = $true
                          break
                      }
                  }
              }
              if (-not $found) { 
                  Write-Warning "Could not find DLL for pattern $pattern" 
              }
          }          

      - name: Prepare release directory
        run: |
          New-Item -ItemType Directory -Force -Path new_release
  
      - name: Create ZIP archive slipshow-${{ matrix.config.name }}-${{ matrix.config.target }}.zip
        run: Compress-Archive -Path ${{ github.workspace }}/bundle/* -DestinationPath new_release/slipshow-${{ matrix.config.name }}-${{ matrix.config.target }}.zip
  
      - name: Upload archives
        uses: actions/upload-artifact@v4
        with:
          name: archives-windows-${{ matrix.config.arch }}
          path: new_release/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux-build, mac-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: archives-*
          path: archives
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            archives/*
